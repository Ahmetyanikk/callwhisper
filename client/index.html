<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>CallWhisper</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>CallWhisper</h1>
    <div id="device-picker">
      <div class="device-row">
        <label class="device-label">Rep mic</label>
        <select id="rep-select"></select>
        <button id="btn-test-rep" class="btn-secondary">Test</button>
        <span id="rep-rms" class="rms-result"></span>
      </div>
      <div class="device-row">
        <label class="device-label">Prospect (system audio)</label>
        <select id="prospect-select"></select>
        <button id="btn-test-prospect" class="btn-secondary">Test</button>
        <span id="prospect-rms" class="rms-result"></span>
      </div>
    </div>
    <div class="session-controls">
      <button id="btn-toggle">Start Session</button>
      <span id="status-indicator" class="status-idle">&#9679; Idle</span>
    </div>
  </header>
  <main>
    <section id="panel-transcript">
      <h2>Transcript</h2>
      <div id="transcript-log"></div>
    </section>
    <section id="panel-coaching">
      <h2>Coaching</h2>
      <div id="coaching-log"></div>
    </section>
  </main>
  <script type="module" src="app.js"></script>
</body>
</html>
